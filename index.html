<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>母亲节快乐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #fff0f5 30%, #fff8e1 70%, #fce4ec 100%);
            font-family: 'Georgia', 'Songti SC', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 飘落花瓣 */
        .petal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .petal {
            position: absolute;
            top: -40px;
            width: 20px;
            height: 20px;
            background: radial-gradient(ellipse at 30% 30%, #ffb7c5, #f48fb1);
            border-radius: 50% 0 50% 0;
            opacity: 0.7;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 1;
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 50px 40px 45px;
            box-shadow:
                0 20px 60px rgba(233, 30, 99, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-4px); }

        /* 装饰花环 */
        .wreath {
            font-size: 60px;
            line-height: 1;
            margin-bottom: 8px;
            animation: sway 3s ease-in-out infinite;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50%      { transform: rotate(3deg); }
        }

        /* 标题 */
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #e91e63, #ff6f00, #e91e63);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
            margin-bottom: 4px;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 20px;
            color: #ad1457;
            letter-spacing: 6px;
            margin-bottom: 30px;
        }

        /* 分隔线 */
        .divider {
            width: 120px;
            height: 2px;
            margin: 0 auto 28px;
            background: linear-gradient(90deg, transparent, #e91e63, transparent);
            border-radius: 2px;
        }

        /* 祝福语 */
        .message {
            font-size: 18px;
            line-height: 2;
            color: #4a2c3b;
            margin-bottom: 32px;
            padding: 0 10px;
        }
        .message p { margin-bottom: 12px; }
        .highlight {
            display: inline-block;
            background: linear-gradient(120deg, #fce4ec 0%, #fce4ec 40%, #fff8e1 100%);
            padding: 0 8px;
            border-radius: 4px;
        }

        /* 爱心按钮 */
        .heart-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 44px;
            font-size: 20px;
            font-family: inherit;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e91e63, #ff6f00);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 24px rgba(233, 30, 99, 0.35);
        }
        .heart-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 8px 32px rgba(233, 30, 99, 0.5);
        }
        .heart-btn:active { transform: scale(0.96); }

        .heart-btn .heart {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .heart-btn:hover .heart {
            animation: heartbeat 0.8s ease infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25%      { transform: scale(1.35); }
            50%      { transform: scale(1); }
            75%      { transform: scale(1.35); }
        }

        /* 弹出祝福 */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .popup-overlay.show { display: flex; }

        .popup {
            background: #fff;
            border-radius: 32px;
            padding: 48px 36px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
        }
        @keyframes popIn {
            0%   { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1);   opacity: 1; }
        }

        .popup .big-heart { font-size: 72px; line-height: 1; margin-bottom: 16px; }
        .popup h2 {
            font-size: 28px;
            color: #e91e63;
            margin-bottom: 16px;
        }
        .popup p {
            font-size: 18px;
            line-height: 1.9;
            color: #4a2c3b;
            margin-bottom: 24px;
        }
        .popup .close-btn {
            padding: 10px 36px;
            font-size: 16px;
            font-family: inherit;
            background: #fce4ec;
            color: #ad1457;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .popup .close-btn:hover { background: #f8bbd0; }

        /* 页脚 */
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #b5838d;
        }

        /* 响应式 */
        @media (max-width: 500px) {
            .card { padding: 32px 20px 30px; }
            h1 { font-size: 34px; }
            .message { font-size: 16px; }
            .heart-btn { padding: 12px 30px; font-size: 17px; }
        }
    </style>
</head>
<body>

    <!-- 飘落花瓣 -->
    <div class="petal-container" id="petalContainer"></div>

    <!-- 主卡片 -->
    <main class="card">
        <div class="wreath">&#127800;</div>
        <h1>母亲节快乐</h1>
        <div class="subtitle">&#10086; Happy Mother's Day &#10086;</div>
        <div class="divider"></div>

        <div class="message">
            <p>亲爱的妈妈：</p>
            <p>
                您的手掌是我童年最暖的港湾，<br>
                您的白发是岁月最温柔的勋章。
            </p>
            <p>
                愿时光对您温柔以待，<br>
                愿笑容永远在您脸上盛开。
            </p>
            <p class="highlight">&#10084; 您陪我长大，我陪您变老 &#10084;</p>
        </div>

        <button class="heart-btn" onclick="showSurprise()">
            <span class="heart">&#10084;</span>
            点击送祝福
        </button>

        <div class="footer">&#127801; 爱你的孩子 &#127801;</div>
    </main>

    <!-- 弹出祝福 -->
    <div class="popup-overlay" id="popup">
        <div class="popup">
            <div class="big-heart">&#10084;&#65039;</div>
            <h2>妈妈，我爱你</h2>
            <p>
                谢谢您每一天的付出与包容。<br>
                您是世界上最好的妈妈。<br>
                祝您母亲节快乐，健康平安！
            </p>
            <p style="font-size: 28px; margin-bottom: 20px;">&#127800; &#127801; &#127802;</p>
            <button class="close-btn" onclick="hideSurprise()">收下心意 &nbsp;&#10084;</button>
        </div>
    </div>

    <script>
        // 生成飘落花瓣
        (function createPetals() {
            const container = document.getElementById('petalContainer');
            const count = 24;
            for (let i = 0; i < count; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.width = petal.style.height = (12 + Math.random() * 14) + 'px';
                petal.style.animationDuration = (6 + Math.random() * 8) + 's';
                petal.style.animationDelay = (Math.random() * 10) + 's';
                petal.style.opacity = 0.4 + Math.random() * 0.4;
                container.appendChild(petal);
            }
        })();

        // 弹窗控制
        function showSurprise() {
            document.getElementById('popup').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        function hideSurprise() {
            document.getElementById('popup').classList.remove('show');
            document.body.style.overflow = '';
        }
        // 点击遮罩关闭
        document.getElementById('popup').addEventListener('click', function(e) {
            if (e.target === this) hideSurprise();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') hideSurprise();
        });
    </script>
</body>
</html>
